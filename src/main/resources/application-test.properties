# Perfil test: MySQL 8 local (puerto 3307). Crear BD mgdb_test si no existe.
spring.datasource.url=jdbc:mysql://localhost:3307/mgdb_test?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.clean-disabled=false

jwt.secret=testSecretKeyWithAtLeast256BitsForHS256AlgorithmSecurity
jwt.expiration-ms=3600000

spring.mail.host=localhost
spring.mail.port=3025

# S3 adjuntos (bucket de test)
mg.attachments.bucket=mg-work-request-test
mg.attachments.region=us-east-2
mg.attachments.max-file-size-bytes=2097152
mg.attachments.max-files-per-request=5
mg.attachments.presigned-expiration-minutes=60

# Mail - Zoho (support.desk@mgservicesunlimited.com). Poner password debajo o usar SPRING_MAIL_PASSWORD en entorno.
spring.mail.host=${SPRING_MAIL_HOST:smtppro.zoho.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:support.desk@mgservicesunlimited.com}
# Reemplaza TU_PASSWORD_ZOHO por la contraseña real (o usa variable de entorno SPRING_MAIL_PASSWORD):
spring.mail.password=${SPRING_MAIL_PASSWORD:uqgzC3?i}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtppro.zoho.com

# En test, redirigir todos los correos a estas direcciones. Puedes sobrescribir con variable de entorno MG_MAIL_OVERRIDE_TO (lista separada por comas).
mg.mail.override-to=${MG_MAIL_OVERRIDE_TO:renxbazan@gmail.com,rbazan@mgservicesunlimited.com}

# URL del frontend para el enlace "View request" en los correos (variable de entorno MG_APP_BASE_URL).
mg.app.base-url=${MG_APP_BASE_URL:http://localhost:8080}
