# Server
server.port=${PORT:8080}
server.servlet.context-path=/

# Database - usar variables de entorno en producción
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/mgdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate - sin DDL; Flyway gestiona el esquema
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway (en prod solo se usa classpath:db/migration; ver application-prod.properties)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration,classpath:db/migration/optional

# JWT
jwt.secret=${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyChangeInProduction}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Mail - Zoho (support.desk@mgservicesunlimited.com). Poner password debajo o usar SPRING_MAIL_PASSWORD en entorno.
spring.mail.host=${SPRING_MAIL_HOST:smtppro.zoho.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:support.desk@mgservicesunlimited.com}
# Reemplaza TU_PASSWORD_ZOHO por la contraseña real (o usa variable de entorno SPRING_MAIL_PASSWORD):
spring.mail.password=${SPRING_MAIL_PASSWORD:uqgzC3?i}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtppro.zoho.com

# Redirigir todos los correos a estas direcciones (opcional). Variable de entorno MG_MAIL_OVERRIDE_TO (lista separada por comas). Vacío = destinatarios reales.
mg.mail.override-to=${MG_MAIL_OVERRIDE_TO:}

# URL base del frontend (para enlaces "Ver request" en los correos). Variable de entorno MG_APP_BASE_URL.
mg.app.base-url=${MG_APP_BASE_URL:}

# CORS: orígenes permitidos separados por coma. Variable de entorno MG_CORS_ALLOWED_ORIGINS. Vacío = permitir todos (*).
mg.cors.allowed-origins=${MG_CORS_ALLOWED_ORIGINS:}

# JMX
spring.jmx.enabled=false

# S3 attachments (optional: leave empty to disable)
mg.attachments.bucket=${MG_ATTACHMENTS_BUCKET:mg-work-request-test}
mg.attachments.region=${AWS_REGION:us-west-2}
mg.attachments.max-file-size-bytes=2097152
mg.attachments.max-files-per-request=5
mg.attachments.presigned-expiration-minutes=60

mg.app.base-url=${MG_APP_BASE_URL:http://localhost:8080}
