# Perfil de producción - optimizado para instancias pequeñas (t3.micro, ECS Fargate)
# Activar con: -Dspring.profiles.active=prod

# HikariCP - reducir conexiones para RDS pequeño
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA - evitar Open Session In View (menor uso de conexiones por request)
spring.jpa.open-in-view=false

# Logs - silenciar en producción
logging.level.root=WARN
logging.level.com.renx.mg=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
